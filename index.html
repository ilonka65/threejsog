<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>3D Big Scrub Map</title>
    <style>
      body { 
        margin: 0; 
        overflow: hidden; 
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      /* Floating Museum-Grade HUD Container */
      #species-hud {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 320px;
        background: rgba(5, 15, 10, 0.85);
        border: 2px solid #39ff14;
        border-radius: 8px;
        padding: 16px;
        color: #ffffff;
        pointer-events: none; /* Allows mouse interactions to pass right through to canvas */
        opacity: 0;
        transition: opacity 0.25s ease, border-color 0.25s ease;
        box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <!-- The Raycaster updates this container when hovering over a node -->
    <div id="species-hud"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
